services:
  - type: web
    name: archon
    runtime: node
    buildCommand: npm install && npm run build && cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEYS
        sync: false
      - key: HF_API_KEYS
        sync: false
