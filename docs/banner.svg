<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="280" viewBox="0 0 1280 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080d"/>
      <stop offset="50%" style="stop-color:#0d0d15"/>
      <stop offset="100%" style="stop-color:#08080d"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="280" fill="url(#bg)"/>
  
  <!-- Subtle glow -->
  <ellipse cx="640" cy="130" rx="400" ry="120" fill="url(#glow)"/>
  
  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="0.5">
    <line x1="320" y1="0" x2="320" y2="280"/>
    <line x1="640" y1="0" x2="640" y2="280"/>
    <line x1="960" y1="0" x2="960" y2="280"/>
    <line x1="0" y1="93" x2="1280" y2="93"/>
    <line x1="0" y1="186" x2="1280" y2="186"/>
  </g>
  
  <!-- Lightning bolt icon -->
  <g transform="translate(520, 88)" opacity="0.7">
    <polygon points="20,0 8,22 16,22 10,40 28,16 18,16 24,0" fill="url(#textGrad)" filter="url(#blur)"/>
    <polygon points="20,0 8,22 16,22 10,40 28,16 18,16 24,0" fill="url(#textGrad)"/>
  </g>
  
  <!-- ARCHON text -->
  <text x="640" y="130" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="64" font-weight="800" letter-spacing="8" fill="url(#textGrad)">ARCHON</text>
  
  <!-- Subtitle -->
  <text x="640" y="170" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" letter-spacing="4" fill="#555" opacity="0.7">AI SYSTEM ARCHITECT</text>
  
  <!-- Bottom accent line -->
  <rect x="560" y="200" width="160" height="1.5" rx="1" fill="url(#textGrad)" opacity="0.3"/>
</svg>
