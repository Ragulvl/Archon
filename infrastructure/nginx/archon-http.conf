# ─────────────────────────────────────────────────────────────────────────────
# Nginx HTTP-only config for initial EC2 setup (before SSL certificate)
#
# Use this BEFORE running Certbot:
#   sudo cp infrastructure/nginx/archon-http.conf /etc/nginx/sites-available/archon
#   sudo ln -sf /etc/nginx/sites-available/archon /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d archon.dinez.in
#
# After Certbot succeeds, switch to archon.conf (HTTPS version).
# ─────────────────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream archon_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name archon.dinez.in;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Frontend SPA
    root  /var/www/archon/frontend;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location ~* \.(js|css|woff2?|ttf|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        proxy_pass         http://archon_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        access_log off;
    }

    location /api/ {
        proxy_pass         http://archon_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /generate {
        proxy_pass         http://archon_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_read_timeout 180s;
    }

    location /socket.io/ {
        proxy_pass          http://archon_backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade     $http_upgrade;
        proxy_set_header    Connection  $connection_upgrade;
        proxy_set_header    Host        $host;
        proxy_set_header    X-Real-IP   $remote_addr;
        proxy_read_timeout  3600s;
        proxy_buffering     off;
    }
}
