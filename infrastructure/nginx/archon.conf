# ─────────────────────────────────────────────────────────────────────────────
# Nginx production config for Archon
# Domain: archon.dinez.in (replace with your domain)
#
# Handles:
#   /           → Frontend SPA (React)
#   /api/       → Backend Express (port 5000)
#   /socket.io/ → Backend WebSocket (port 5000)
#   /health     → Backend health check (port 5000)
#   /generate   → Legacy AI endpoint (port 5000)
#
# Prerequisites:
#   - SSL cert at /etc/letsencrypt/live/<domain>/
#   - Frontend built to /var/www/archon/frontend
#   - Backend running on 127.0.0.1:5000 via PM2
# ─────────────────────────────────────────────────────────────────────────────

# WebSocket upgrade map — required for Socket.IO behind Nginx
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Backend upstream with keepalive
upstream archon_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name archon.dinez.in;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name archon.dinez.in;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/archon.dinez.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/archon.dinez.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Proxy buffer tweaks for AI streaming responses ────────────────────────
    proxy_buffer_size          16k;
    proxy_buffers              8 16k;
    proxy_busy_buffers_size    32k;

    # ── Frontend SPA ─────────────────────────────────────────────────────────
    root  /var/www/archon/frontend;
    index index.html;

    # HTML — no cache (SPA index.html must always be fresh for routing)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # Static assets (JS/CSS/fonts/images) — long-term cache
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA catch-all — serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check (no auth, no cache) ──────────────────────────────────────
    location /health {
        proxy_pass         http://archon_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "no-store";
        access_log         off;
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass          http://archon_backend;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        "";
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_cache_bypass  $http_upgrade;
    }

    # ── Legacy /generate endpoint ─────────────────────────────────────────────
    location /generate {
        proxy_pass          http://archon_backend;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  180s;
        proxy_send_timeout  180s;
    }

    # ── Socket.IO WebSocket proxy ─────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass          http://archon_backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }
}
